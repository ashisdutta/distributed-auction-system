services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: auction_db
    ports:
      - "5432:5432"
    volumes:
      # This is the 'Permanent' part. 
      # It maps the folder on YOUR machine to the folder INSIDE Docker.
      - postgres_data:/var/lib/postgresql/data 

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"

  worker:
    build: .
    command: npm run worker
    restart: always
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/auction_db
      - REDIS_URL=redis://redis:6379
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - db
      - redis
volumes:
  postgres_data:
